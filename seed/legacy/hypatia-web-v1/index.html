<!DOCTYPE html>
<html lang="ar" data-theme="papyrus">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>مستودع هيباتيا للأدب المصري القديم</title>
    <!-- تحميل الخطوط الأكاديمية المريحة للقراءة الطويلة -->
    <link href="https://fonts.googleapis.com/css2?family=Amiri:ital,wght@0,400;0,700;1,400&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        /* تعريف الألوان لكل سِمة بصريّة */
        :root[data-theme="papyrus"] {
            --bg-color: #f6ecd0;
            --text-color: #2c2512;
            --accent-color: #8c6239;
            --card-bg: #eddcb9;
            --border-color: #dac7a3;
            --muted-text: #6d5b3d;
        }
        :root[data-theme="light"] {
            --bg-color: #fdfdfd;
            --text-color: #1a1a1a;
            --accent-color: #3182ce;
            --card-bg: #f7fafc;
            --border-color: #e2e8f0;
            --muted-text: #718096;
        }
        :root[data-theme="dark"] {
            --bg-color: #121212;
            --text-color: #e2e8f0;
            --accent-color: #63b3ed;
            --card-bg: #1d1d1d;
            --border-color: #2d3748;
            --muted-text: #a0aec0;
        }

        * {
            box-sizing: border-box;
            transition: background-color 0.2s, color 0.2s;
        }

        body {
            margin: 0;
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            display: flex;
            height: 100vh;
            overflow: hidden;
            direction: rtl;
        }

        /* تنسيق الأعمدة المرنة القابلة للطي والتحجيم بالجر والسحب بالماوس */
        .sidebar {
            width: 280px;
            min-width: 150px;
            max-width: 450px;
            background-color: var(--card-bg);
            border-left: 1px solid var(--border-color);
            display: flex;
            flex-direction: column;
            padding: 15px;
            overflow-y: auto;
            position: relative;
            flex: none; /* إلغاء التمدد التلقائي للسماح بالتحجيم المرن */
        }

        .sidebar.collapsed {
            width: 0 !important;
            min-width: 0 !important;
            padding: 0 !important;
            overflow: hidden;
            border-left: none;
        }

        .sidebar h2 {
            font-family: 'Amiri', serif;
            margin-top: 0;
            font-size: 1.4rem;
            border-bottom: 2px solid var(--accent-color);
            padding-bottom: 10px;
        }

        .story-link {
            padding: 10px;
            margin: 4px 0;
            border-radius: 6px;
            cursor: pointer;
            border: 1px solid transparent;
            font-family: 'Amiri', serif;
            font-size: 1.05rem;
        }

        .story-link:hover {
            background-color: var(--border-color);
        }

        .story-link.active {
            background-color: var(--accent-color);
            color: #fff;
            font-weight: bold;
        }

        /* فواصل التحجيم التفاعلية بالسحب بالماوس */
        .resize-splitter {
            width: 6px;
            background-color: var(--border-color);
            cursor: col-resize;
            transition: background-color 0.15s;
            z-index: 50;
        }
        .resize-splitter:hover {
            background-color: var(--accent-color);
        }

        .reader-pane {
            flex: 1;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        /* الشريط العلوي النحيف والقابل للطي 75% */
        .control-bar {
            position: sticky;
            top: 0;
            z-index: 100;
            display: flex;
            flex-direction: column;
            background-color: var(--card-bg);
            padding: 6px 20px;
            border-bottom: 2px solid var(--border-color);
            box-shadow: 0 4px 6px -1px rgba(0,0,0,0.05);
        }

        .control-bar-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            width: 100%;
        }

        .active-story-title {
            font-family: 'Amiri', serif;
            font-size: 1.25rem;
            font-weight: bold;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .about-story-btn {
            background-color: var(--border-color);
            border: 1px solid var(--border-color);
            color: var(--text-color);
            border-radius: 4px;
            padding: 3px 8px;
            cursor: pointer;
            font-size: 0.8rem;
            font-family: 'Amiri', serif;
            font-weight: bold;
        }

        .about-story-btn:hover {
            background-color: var(--accent-color);
            color: #fff;
        }

        /* زر طي 75% من الهيدر */
        .header-toggle-btn {
            background: none;
            border: none;
            color: var(--accent-color);
            cursor: pointer;
            font-size: 1rem;
            font-weight: bold;
            padding: 4px;
        }

        .control-bar-settings {
            display: flex;
            flex-direction: column;
            gap: 10px;
            margin-top: 10px;
            border-top: 1px dashed var(--border-color);
            padding-top: 8px;
        }

        .control-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            width: 100%;
            flex-wrap: wrap;
            gap: 10px;
        }

        .display-filters {
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
            align-items: center;
            background-color: var(--bg-color);
            padding: 5px 12px;
            border-radius: 6px;
            border: 1px solid var(--border-color);
        }

        .filter-item {
            display: flex;
            align-items: center;
            gap: 5px;
            font-size: 0.85rem;
            cursor: pointer;
            user-select: none;
        }

        .scrollable-content {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
        }

        .font-sizer {
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 0.85rem;
        }

        /* كروت الجمل المصغرة */
        .sentence-card {
            background-color: var(--card-bg);
            border-radius: 8px;
            padding: 20px;
            margin-bottom: 25px;
            border: 1px solid var(--border-color);
            display: flex;
            flex-direction: column;
        }

        .glyphs-display {
            font-size: 2rem;
            margin-bottom: 12px;
            line-height: 1.5;
            letter-spacing: 1px;
            color: var(--text-color);
        }

        .arabic-display {
            font-family: 'Amiri', serif;
            font-size: 1.8rem;
            font-weight: 700;
            line-height: 1.4;
            color: var(--text-color);
            margin-bottom: 12px;
        }

        /* التنسيق الجديد لزر التعديل المجرّد والبعيد عن التداخل والتراكب البصري لليسار */
        .suggest-btn {
            align-self: flex-start;
            background-color: var(--border-color);
            border: 1px solid var(--border-color);
            color: var(--accent-color);
            padding: 4px 10px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 0.8rem;
            font-family: 'Inter', sans-serif;
            font-weight: 500;
            margin-bottom: 10px;
            float: left; /* جعل الزر يطفو ناحية الشمال برقة */
        }

        .suggest-btn:hover {
            background-color: var(--accent-color);
            color: #fff;
            border-color: var(--accent-color);
        }

        /* الأشرطة الملونة لتحديد لغة المصدر الأصلية للترجمة */
        .source-badge {
            display: inline-block;
            font-size: 0.75rem;
            padding: 1px 6px;
            border-radius: 3px;
            font-weight: bold;
            margin-right: 8px;
            vertical-align: middle;
        }
        .source-badge.german { background-color: #ecc94b; color: #2c2512; }
        .source-badge.english { background-color: #3182ce; color: #fff; }
        .source-badge.french { background-color: #319795; color: #fff; }

        .details-section {
            border-top: 1px dashed var(--border-color);
            padding-top: 12px;
            display: flex;
            flex-direction: column;
            gap: 6px;
            clear: both; /* إلغاء الطفو لضمان استقرار الأسطر */
        }

        .detail-row {
            display: flex;
            align-items: flex-start;
            gap: 8px;
            font-size: 0.88rem;
            line-height: 1.35;
        }

        .detail-row strong {
            min-width: 80px;
            color: var(--text-color);
            display: inline-block;
        }

        .detail-row span {
            color: var(--muted-text);
            flex: 1;
        }

        .word-token {
            display: inline-block;
            background-color: var(--border-color);
            padding: 1px 6px;
            border-radius: 4px;
            margin: 1px;
            cursor: pointer;
            font-size: 0.8rem;
            font-weight: 500;
        }

        .word-token:hover {
            background-color: var(--accent-color);
            color: #fff;
        }

        .word-token.active-token {
            background-color: var(--accent-color) !important;
            color: #fff !important;
            box-shadow: 0 0 3px var(--accent-color);
            transform: scale(1.05);
            font-weight: bold;
        }

        /* لوحة القاموس الجانبية القابلة للطي والتحجيم */
        .dictionary-drawer {
            width: 320px;
            min-width: 150px;
            max-width: 450px;
            background-color: var(--card-bg);
            border-right: 1px solid var(--border-color);
            padding: 15px;
            display: none;
            flex-direction: column;
            overflow-y: auto;
            flex: none; /* إلغاء التمدد للسماح بالسحب بالسحب */
        }

        .dictionary-drawer h3 {
            font-family: 'Amiri', serif;
            margin-top: 0;
            border-bottom: 2px solid var(--accent-color);
            padding-bottom: 8px;
        }

        .drawer-close {
            background: none;
            border: none;
            color: var(--accent-color);
            cursor: pointer;
            float: left;
            font-weight: bold;
        }

        .drawer-row {
            margin-bottom: 10px;
            line-height: 1.35;
        }
        .drawer-row strong {
            display: block;
            font-size: 0.88rem;
            color: var(--text-color);
            margin-bottom: 2px;
        }
        .drawer-row span {
            color: var(--muted-text);
        }

        .accordion-header {
            background-color: var(--border-color);
            padding: 10px 14px;
            border-radius: 6px;
            margin-top: 8px;
            cursor: pointer;
            font-weight: bold;
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-family: 'Amiri', serif;
            font-size: 1rem;
            border: 1px solid var(--border-color);
            position: relative;
        }

        .accordion-header:hover {
            background-color: var(--accent-color);
            color: #fff;
        }

        .accordion-body {
            display: none;
            padding: 12px;
            border: 1px solid var(--border-color);
            border-top: none;
            border-bottom-left-radius: 6px;
            border-bottom-right-radius: 6px;
            background-color: var(--bg-color);
            margin-bottom: 8px;
            position: relative;
        }

        .accordion-body.open {
            display: block;
        }

        .card-container {
            border: 1px solid var(--border-color);
            padding: 12px;
            border-radius: 6px;
            margin-bottom: 12px;
            background-color: var(--bg-color);
            position: relative;
        }

        .modal {
            display: none;
            position: fixed;
            z-index: 1100;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.5);
            align-items: center;
            justify-content: center;
            direction: rtl;
        }

        .modal-content {
            background-color: var(--card-bg);
            padding: 20px;
            border: 1px solid var(--border-color);
            width: 90%;
            max-width: 500px;
            border-radius: 8px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.15);
            color: var(--text-color);
            position: relative;
            max-height: 90vh;
            overflow-y: auto;
            direction: rtl;
        }

        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 2px solid var(--accent-color);
            padding-bottom: 8px;
            margin-bottom: 15px;
        }

        .modal-header h3 {
            margin: 0;
            font-family: 'Amiri', serif;
            font-size: 1.3rem;
        }

        .modal-close {
            background: none;
            border: none;
            color: var(--text-color);
            font-size: 1.3rem;
            cursor: pointer;
            font-weight: bold;
        }

        .form-group {
            margin-bottom: 12px;
        }

        .form-group label {
            display: block;
            margin-bottom: 4px;
            font-weight: 600;
            font-size: 0.88rem;
        }

        .form-group input, .form-group textarea, .form-group select {
            width: 100%;
            padding: 8px;
            border: 1px solid var(--border-color);
            border-radius: 4px;
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: inherit;
            font-size: 0.88rem;
        }

        .form-group textarea {
            resize: vertical;
            height: 70px;
        }

        .submit-btn {
            background-color: var(--accent-color);
            color: #fff;
            border: none;
            padding: 10px 15px;
            border-radius: 4px;
            cursor: pointer;
            font-weight: bold;
            width: 100%;
            font-size: 0.95rem;
            font-family: 'Amiri', serif;
        }

        /* أيقونات الأكورديون لطبقة المعرفة */
        .insight-section {
            margin-top: 12px;
            border-top: 1px dashed var(--border-color);
            padding-top: 8px;
        }
        .colloc-badge {
            display: inline-block;
            font-size: 0.8rem;
            background-color: var(--border-color);
            padding: 2px 6px;
            border-radius: 4px;
            margin: 2px;
        }
    </style>
</head>
<body>

    <!-- زر طي القائمة الجانبية الأيسر الخارجي -->
    <button id="sidebarToggle" style="position: fixed; top: 15px; right: 15px; z-index: 101; background: var(--card-bg); border: 1px solid var(--border-color); border-radius: 4px; padding: 4px 8px; cursor: pointer; color: var(--accent-color); font-weight: bold;">☰ القائمة</button>

    <!-- 1. القائمة الجانبية للأدب -->
    <div class="sidebar" id="sidebar">
        <h2 style="margin-top: 35px;">نصوص هيباتيا</h2>
        <div id="storiesList">
            <p style="font-size: 0.85rem; color: var(--muted-text);">جاري فحص القصص...</p>
        </div>
    </div>

    <!-- فاصل السحب الرأسي الأول -->
    <div class="resize-splitter" id="splitter1"></div>

    <!-- 2. لوحة القراءة الرئيسية المحدثة -->
    <div class="reader-pane">
        <!-- الشريط العلوي الثابت مع ميزة طي الإعدادات -->
        <div class="control-bar" id="controlBar">
            <div class="control-bar-header">
                <!-- ملصق القصة النشطة وتفاصيل المخطوط المرافقة -->
                <div class="active-story-title">
                    <span id="activeStoryLabel">📖 جاري جلب المخطوط...</span>
                    <button class="about-story-btn" onclick="openAboutModal()">ℹ️ تفاصيل البردية</button>
                </div>
                <!-- زر طي وتقليص 75% من الهيدر -->
                <button class="header-toggle-btn" onclick="toggleHeaderSettings(this)">خيارات العرض ▲</button>
            </div>

            <!-- حاوية الإعدادات القابلة للطي -->
            <div class="control-bar-settings" id="headerSettings">
                <div class="control-row">
                    <div>
                        <button class="theme-btn" onclick="setTheme('papyrus')">ورق بردي 📜</button>
                        <button class="theme-btn" onclick="setTheme('light')">نهاري ☀️</button>
                        <button class="theme-btn" onclick="setTheme('dark')">ليلي 🌙</button>
                    </div>
                    <div class="font-sizer">
                        <span>حجم الخط:</span>
                        <input type="range" min="14" max="36" value="26" oninput="changeFontSize(this.value)">
                    </div>
                </div>

                <div class="control-row">
                    <div class="display-filters">
                        <span style="font-weight: bold; font-size: 0.85rem; margin-left: 5px;">طبقات العرض النشطة:</span>
                        <label class="filter-item"><input type="checkbox" id="showGlyphs" checked onchange="updateVisibility()"> الرسم الفرعوني</label>
                        <label class="filter-item"><input type="checkbox" id="showArabic" checked onchange="updateVisibility()"> الترجمة العربية</label>
                        <label class="filter-item"><input type="checkbox" id="showId" checked onchange="updateVisibility()"> معرّف السطر</label>
                        <label class="filter-item"><input type="checkbox" id="showTranslit" checked onchange="updateVisibility()"> النقل الصوتي</label>
                        <label class="filter-item"><input type="checkbox" id="showEnglish" checked onchange="updateVisibility()"> الإنجليزية</label>
                        <label class="filter-item"><input type="checkbox" id="showGerman" checked onchange="updateVisibility()"> الألمانية</label>
                        <label class="filter-item"><input type="checkbox" id="showFrench" checked onchange="updateVisibility()"> الفرنسية</label>
                        <label class="filter-item"><input type="checkbox" id="showNotes" checked onchange="updateVisibility()"> الملاحظات الأثرية</label>
                    </div>
                </div>
            </div>
        </div>

        <!-- وعاء التمرير والسكرول أسفل الشريط الثابت -->
        <div class="scrollable-content" id="storyContainer">
            <p>يرجى اختيار قصة من القائمة الجانبية للبدء بالقراءة.</p>
        </div>
    </div>

    <!-- فاصل السحب الرأسي الثاني -->
    <div class="resize-splitter" id="splitter2"></div>

    <!-- 3. لوحة القاموس الجانبية التفاعلية -->
    <div class="dictionary-drawer" id="dictionaryDrawer">
        <div>
            <button class="drawer-close" onclick="closeDrawer()">✕ أغلق</button>
            <h3>تحليل المفردة الأكاديمي</h3>
        </div>
        <div id="dictionaryContent" style="font-family: 'Amiri', serif; font-size: 1.25rem;">
            <p style="color: var(--muted-text)">اضغط على أي كلمة من النقل الصوتي للاستكشاف.</p>
        </div>
    </div>

    <!-- 4. نافذة مراجعة وتعديل التراجم المنبثقة (Modal) -->
    <div id="suggestionModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h3>تقديم اقتراح مراجعة لغوية (للأثريين والعلماء)</h3>
                <button class="modal-close" onclick="closeModal()">✕</button>
            </div>
            <form id="suggestionForm" onsubmit="submitSuggestion(event)">
                <input type="hidden" id="modalTargetId">
                <input type="hidden" id="modalTargetType">

                <div class="form-group">
                    <label for="fieldModified">الحقل المستهدف بالتصحيح:</label>
                    <select id="fieldModified"></select>
                </div>

                <div class="form-group">
                    <label for="currentValue">الصياغة الحالية المسجلة بالموقع:</label>
                    <textarea id="currentValue" readonly style="opacity: 0.7; background-color: var(--border-color);"></textarea>
                </div>

                <div class="form-group">
                    <label for="proposedValue">الصياغة الأكاديمية الجديدة المقترحة:</label>
                    <textarea id="proposedValue" required placeholder="يرجى كتابة الترجمة أو الصياغة الأصح علمياً..."></textarea>
                </div>

                <div class="form-group">
                    <label for="academicJustification">المستند العلمي والمبرر الأكاديمي للتعديل:</label>
                    <textarea id="academicJustification" required placeholder="مثال: بناءً على قاموس هايدلبرغ أو مبررات نحوية للسطر..."></textarea>
                </div>

                <div class="form-group">
                    <label for="researcherName">الاسم الأكاديمي للباحث (المراجع):</label>
                    <input type="text" id="researcherName" required placeholder="الاسم ثلاثي...">
                </div>

                <div class="form-group">
                    <label for="researcherInstitution">المؤسسة أو الجامعة التابع لها الباحث:</label>
                    <input type="text" id="researcherInstitution" required placeholder="جامعة أو معهد الآثار التابع له الباحث..."></input>
                </div>

                <button type="submit" id="modalSubmitBtn" class="submit-btn">إرسال الاقتراح للتدقيق والمراجعة البشرية</button>
            </form>
        </div>
    </div>

    <!-- 5. نافذة تفاصيل البردية والمخطوط الكلية (About Story Modal) -->
    <div id="aboutStoryModal" class="modal">
        <div class="modal-content" style="font-family: 'Amiri', serif; font-size: 1.25rem;">
            <div class="modal-header">
                <h3>بطاقة التوثيق والاستناد الأثري للمخطوط</h3>
                <button class="modal-close" onclick="closeAboutModal()">✕</button>
            </div>
            <div id="aboutStoryContent">
                <!-- تملأ برمجياً على حسب معلومات القصة المحملة -->
            </div>
        </div>
    </div>

    <script>
        let currentFontSize = 26; // تقليص الخط درجتين معياريتين لرفع التماسك البصري
        let activeStoryData = null; // تخزين معلومات المخطوط النشط بالكامل لخدمة زر التفاصيل لمرة واحدة فقط

        function setTheme(themeName) {
            document.documentElement.setAttribute('data-theme', themeName);
        }

        function changeFontSize(size) {
            currentFontSize = parseInt(size);
            const glyphs = document.querySelectorAll('.glyphs-display');
            const arTranslations = document.querySelectorAll('.arabic-display');
            glyphs.forEach(el => el.style.fontSize = size + 'px');
            arTranslations.forEach(el => el.style.fontSize = (size - 6) + 'px');
        }

        // دالة التحكم بطي 75% من الهيدر
        function toggleHeaderSettings(btn) {
            const settings = document.getElementById('headerSettings');
            if (settings.style.display === 'none') {
                settings.style.display = 'flex';
                btn.innerText = "خيارات العرض ▲";
            } else {

        // برمجة فواصل السحب وتوسيع الألواح بالماوس (Resizable Panels) مع قفل الـ flex لضمان السحب التام
        function initResize(splitterId, targetId, isRightToLeft) {
            const splitter = document.getElementById(splitterId);
            const target = document.getElementById(targetId);
            
            splitter.onmousedown = function(e) {
                e.preventDefault();
                document.onmousemove = function(moveEvent) {
                    let newWidth;
                    if (isRightToLeft) {
                        newWidth = window.innerWidth - moveEvent.clientX;
                    } else {
                        newWidth = moveEvent.clientX;
                    }
                    if (newWidth > 150 && newWidth < 450) {
                        target.style.width = newWidth + 'px';
                        target.style.minWidth = newWidth + 'px';
                        target.style.maxWidth = newWidth + 'px';
                        target.style.flex = 'none'; // إلغاء الـ flex للتأكد من مواءمة العرض بالسحب
                    }
                };
                document.onmouseup = function() {
                    document.onmousemove = null;
                    document.onmouseup = null;
                };
            };
        }
        initResize('splitter1', 'sidebar', false);
        initResize('splitter2', 'dictionaryDrawer', true);

                { id: 'showGlyphs', selector: '.glyphs-display' },

                { id: 'showGerman', selector: '.german-row' },
                { id: 'showFrench', selector: '.french-row' },
                { id: 'showNotes', selector: '.notes-row' }
            ];

            configs.forEach(cfg => {

        // دالة التحكم بفتح وإغلاق الأكورديون يدوياً للبطاقات الجانبية
        function toggleAccordion(headerElement) {
            const body = headerElement.nextElementSibling;
            const isOpen = body.classList.contains('open');
            
            // إغلاق جميع الأكورديونات الأخرى للحفاظ على الترتيب والجاذبية البصرية
            document.querySelectorAll('.accordion-body').forEach(el => el.classList.remove('open'));
            document.querySelectorAll('.accordion-header').forEach(el => el.classList.remove('active'));
            document.querySelectorAll('.accordion-header .arrow').forEach(el => el.innerText = '▼');
            
            if (!isOpen) {
                body.classList.add('open');
                headerElement.classList.add('active');
                headerElement.querySelector('.arrow').innerText = '▲';
            }

        // دالة إرسال المقترح اللغوي للخادم لحفظه في سجل المراجعات المحلي بأمان
        async function submitSuggestion(event) {
            event.preventDefault();
            
            const submitBtn = document.getElementById('modalSubmitBtn');
            submitBtn.disabled = true;
            submitBtn.innerText = "جاري إرسال اقتراحك اللغوي...";

            const targetId = document.getElementById('modalTargetId').value;
            const targetType = document.getElementById('modalTargetType').value;
            const fieldModified = document.getElementById('fieldModified').value;
            const currentValue = document.getElementById('currentValue').value;
            const proposedValue = document.getElementById('proposedValue').value;
            const academicJustification = document.getElementById('academicJustification').value;
            const researcherName = document.getElementById('researcherName').value;
            const researcherInstitution = document.getElementById('researcherInstitution').value;

            const suggestionPayload = {
                target_id: targetId,
                target_type: targetType,
                field_modified: fieldModified,
                current_value: currentValue,
                proposed_value: proposedValue,
                academic_justification: academicJustification,
                researcher_name: researcherName,
                researcher_institution: researcherInstitution
            };

            try {
                const response = await fetch('/api/suggest', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify(suggestionPayload)
                });

                const resData = await response.json();

                if (response.ok && resData.success !== false) {
                    alert("تم استلام اقتراحك اللغوي بنجاح!\n\nسيخضع هذا التعديل للتدقيق والمراجعة البشرية الأكاديمية اللامركزية بواسطة اللجان المتخصصة (مثل نظام ريكاباتشا) قبل إقراره بصفة نهائية في التحديث القادم للمستودع. شكراً جزيلاً لإسهامك اللغوي.");
                    closeModal();
                } else {
                    throw new Error(resData.error || "فشل إرسال الاقتراح اللغوي.");
                }
            } catch (err) {
                alert("خطأ: " + err.message);
            } finally {
                submitBtn.disabled = false;
                submitBtn.innerText = "إرسال الاقتراح للتدقيق والمراجعة البشرية";
            }
        }

        // دالة جلب وعرض وقرن بطاقة المفردة الفعلية مع دعم المتشابهات اللفظية والـ Knowledge Insights المتقدمة (5.3, 5.4, 5.5)
        async function openWordCard(wordText, sentenceGlyphs, tokenElement, lemmaRef = "") {
            const drawer = document.getElementById('dictionaryDrawer');
            const content = document.getElementById('dictionaryContent');
            
            // تفعيل التميز اللوني الثابت للكلمة المختارة
            document.querySelectorAll('.word-token').forEach(el => el.classList.remove('active-token'));
            if (tokenElement) {
                tokenElement.classList.add('active-token');
            }

            drawer.style.display = 'flex';
            content.innerHTML = "<p style='font-size:0.95rem; color:var(--muted-text)'>جاري فحص وقراءة بطاقة المفردة في القاموس...</p>";
            
            try {
                const response = await fetch(`/api/dictionary?word=${encodeURIComponent(wordText)}&sentence_glyph=${encodeURIComponent(sentenceGlyphs)}&lemma_ref=${encodeURIComponent(lemmaRef)}`);
                if (!response.ok) {
                    const errData = await response.json();
                    throw new Error(errData.error);
                }
                
                const cards = await response.json(); 
                let accumulatedHtml = "";

                // التحقق مما إذا كانت الاستجابة تفيد بعدم وجود الكلمة (Not Found) لمعالجتها دون أخطاء بالكونسول
                if (cards.not_found) {
                    throw new Error(cards.error);
                }

                if (cards.length > 1) {
                    accumulatedHtml += `<div style="font-size:0.85rem; color:var(--accent-color); margin-bottom:12px; border-bottom:1px dashed var(--border-color); padding-bottom:8px; font-weight:bold; line-height:1.4;">
                        ⚠️ تم رصد عدد (${cards.length}) متشابهات لفظية (Homonyms) لهذا النطق، وتم ترتيب الأكثر مطابقة لرموز الجملة أولاً:
                    </div>`;
                }

                cards.forEach((card, idx) => {
                    const id = card.metadata ? card.metadata.id : 'N/A';
                    const translit = card.layer1_core ? card.layer1_core.transliteration : wordText;
                    const glyphs = card.layer1_core ? card.layer1_core.hieroglyph : 'unknown';
                    const arMeaning = card.layer2_languages ? card.layer2_languages.arabic : 'N/A';
                    const enMeaning = card.layer2_languages ? card.layer2_languages.english : 'N/A';
                    const sourceName = card.layer5_sources && card.layer5_sources.sources ? card.layer5_sources.sources[0].name : 'N/A';

                    // التحقق مما إذا كانت البطاقة لكيان استنادي تاريخي (HYP-NE) أم كلمة معجمية عادية (HYP-EGY)
                    const isEntity = id.startsWith('HYP-NE-');
                    let entityFieldsHTML = "";
                    
                    if (isEntity && card.layer3_grammar) {
                        const entityClass = card.layer3_grammar.entity_class || 'N/A';
                        const dynasty = card.layer3_grammar.dynasty_association || 'N/A';
                        const period = card.layer3_grammar.chronological_period || 'N/A';
                        const titles = card.layer4_writing ? card.layer4_writing.standard_titles : 'N/A';
                        
                        entityFieldsHTML = `
                            <div class="drawer-row" style="color:var(--accent-color); font-weight:bold;"><strong>تصنيف الكيان:</strong> <span>${entityClass}</span></div>
                            <div class="drawer-row"><strong>الأسرة الحاكمة:</strong> <span>${dynasty}</span></div>
                            <div class="drawer-row"><strong>الحقبة التاريخية:</strong> <span>${period}</span></div>
                            <div class="drawer-row"><strong>الألقاب والنعوت:</strong> <span style="font-size:0.92rem; line-height:1.4;">${titles}</span></div>
                        `;
                    }

                    // استخلاص وعرض مخرجات طبقة المعرفة العميقة المجمعة تلقائياً من البايثون (5.3, 5.4, 5.5) مع فصل الاتجاه
                    let knowledgeHTML = "";
                    if (card.knowledge_insights) {
                        const appearances = card.knowledge_insights.story_appearances || [];
                        const contexts = card.knowledge_insights.context_occurrences || [];
                        const collocations = card.knowledge_insights.collocations || { "left": [], "right": [] };

                        // أ) تدوين 5.3: فهرس القصص
                        let storyLinks = "";
                        if (appearances.length > 0) {
                            appearances.forEach(app => {
                                storyLinks += `<span style="font-size:0.85rem; background-color:var(--border-color); padding:1px 6px; border-radius:3px; margin:2px; display:inline-block;">📖 ${app.id} (${app.title.split(':')[0]})</span>`;
                            });
                        } else {
                            storyLinks = "<span>لم تظهر في قصص أخرى بعد.</span>";
                        }

                        // ب) تدوين 5.4: فهرس مواضع وسياقات الظهور الفعلي في السطور مع تبيين لغة المصدر الأصلية
                        let contextLines = "";
                        if (contexts.length > 0) {
                            contexts.forEach((ctx, c_idx) => {
                                // رصد لغة المصدر الأصلية للجملة لإضفاء تمييز بصري
                                let langBadge = "";
                                if (ctx.original_lang === 'German') langBadge = "<span class='source-badge german'>ألماني 🇩🇪</span>";
                                else if (ctx.original_lang === 'English') langBadge = "<span class='source-badge english'>إنجليزي 🇬🇧</span>";
                                else if (ctx.original_lang === 'French') langBadge = "<span class='source-badge french'>فرنسي 🇫🇷</span>";

                                contextLines += `<div style="font-size:0.85rem; margin-bottom:5px; border-bottom:1px dotted var(--border-color); padding-bottom:3px; color:var(--muted-text);">
                                    <strong>[موضع ${c_idx+1}]</strong> في السطر <strong>${ctx.sentence_id}</strong> من قصة ${ctx.story_title.split(':')[0]} ${langBadge}: 
                                    <span style="display:block; font-style:italic; margin-top:2px;">"${ctx.sentence_arabic}" (موقع الكلمة: ${ctx.position} | إزاحة الحرف: ${ctx.char_offset})</span>
                                </div>`;
                            });
                        } else {
                            contextLines = "<span>لا يوجد سياقات مؤرشفة.</span>";
                        }

                        // ج) تدوين 5.5: المصاحبات اللفظية ثنائية الاتجاه يمين ويسار
                        let collocsLeft = "";
                        let collocsRight = "";
                        
                        const leftList = collocations.left || [];
                        const rightList = collocations.right || [];
                        
                        if (leftList.length > 0) {
                            leftList.forEach(col => {
                                collocsLeft += `<span class="colloc-badge">👉 ${col.word} (${col.count} مرات)</span>`;
                            });
                        } else { collocsLeft = "<span>لا يوجد مصاحبات تسبقها.</span>"; }
                        
                        if (rightList.length > 0) {
                            rightList.forEach(col => {
                                collocsRight += `<span class="colloc-badge">👈 ${col.word} (${col.count} مرات)</span>`;
                            });
                        } else { collocsRight = "<span>لا يوجد مصاحبات تليها.</span>"; }

                        knowledgeHTML = `
                            <div class="insight-section">
                                <div class="drawer-row"><strong>📖 5.3: فهرس المخطوطات المكتشفة تلقائياً:</strong> <div>${storyLinks}</div></div>
                                <div class="drawer-row" style="margin-top:8px;"><strong>👉 الكلمات المجاورة الأكثر تكراراً على اليمين (تسبقها):</strong> <div>${collocsLeft}</div></div>
                                <div class="drawer-row" style="margin-top:8px;"><strong>👈 الكلمات المجاورة الأكثر تكراراً على اليسار (تليها):</strong> <div>${collocsRight}</div></div>
                                <div class="drawer-row" style="margin-top:8px;"><strong>🔍 5.4: مواضع وسياقات الظهور الفعلي:</strong> <div style="max-height:120px; overflow-y:auto; background:var(--card-bg); padding:8px; border-radius:6px;">${contextLines}</div></div>
                            </div>
                        `;
                    }

                    const isOpen = idx === 0;
                    const arrowSymbol = isOpen ? '▲' : '▼';
                    const bodyClass = isOpen ? 'accordion-body open' : 'accordion-body';
                    const headerClass = isOpen ? 'accordion-header active' : 'accordion-header';

                    accumulatedHtml += `
                        <div class="${headerClass}" onclick="toggleAccordion(this)">
                            <span>${id} - ${arMeaning.split('،')[0]}</span>
                            <span class="arrow">${arrowSymbol}</span>
                        </div>
                        <div class="${bodyClass}">
                            <button class="suggest-btn" onclick="openSuggestionModal('${id}', '${isEntity ? 'dictionary_card_ne' : 'dictionary_card'}', this)">📝 اقترح تعديلاً</button>
                            <div class="drawer-row" style="font-size:0.85rem; color: var(--muted-text); margin-top:35px;"><strong>البطاقة المعجمية:</strong> <span>${id} (خيار ${idx+1})</span></div>
                            <div class="drawer-row"><strong>المفردة بالنقل الصوتي:</strong> <span style="color:var(--accent-color); font-weight:bold;">${translit}</span></div>
                            <div class="drawer-row"><strong>الرسم المقترح:</strong> <span style="font-size: 1.9rem; letter-spacing: 1px; display:block; margin-top:5px;">${glyphs !== 'unknown' ? glyphs : '𓏃'}</span></div>
                            
                            <!-- عرض حقول الأعلام الإضافية إن كان الكيان معرّف كـ HYP-NE -->

                            <div class="drawer-row"><strong>المعنى العربي:</strong> <span style="font-weight:bold;">${arMeaning}</span></div>
                            <div class="drawer-row"><strong>المعنى الإنجليزي:</strong> <span>${enMeaning}</span></div>

                            <!-- حقن مخرجات طبقة المعرفة العميقة المجمعة تلقائياً من البايثون (5.3, 5.4, 5.5) -->
                            ${knowledgeHTML}
                        </div>
                    `;
                });

                content.innerHTML = accumulatedHtml;

            } catch (err) {
                content.innerHTML = `
                    <div class="drawer-row"><strong>المفردة بالنقل الصوتي:</strong> <span style="color:var(--accent-color); font-weight:bold;">${wordText}</span></div>

                `;
            }
        }

        async function loadStory(filePath) {
            const container = document.getElementById('storyContainer');
            container.innerHTML = "<p>جاري تحميل النص بالكامل من الملف الموحد...</p>";
            
            try {
                const response = await fetch('/' + filePath);
                if (!response.ok) throw new Error("فشل قراءة الملف.");
                
                const data = await response.json();
                activeStoryData = data; // تخزين معلومات المخطوط النشط بالكامل لخدمة زر التفاصيل
                container.innerHTML = ""; 

                // تحديث عنوان المخطوط النشط في الهيدر الثابت ديناميكياً
                document.getElementById('activeStoryLabel').innerText = `📖 المخطوط الحالي: ${data.metadata.title_ar || data.text_id}`;

                data.sentences.forEach(sentence => {
                    const card = document.createElement('div');
                    card.className = 'sentence-card';
                    
                    const sentenceGlyphEscaped = (sentence.layer1_core.hieroglyph || "").replace(/'/g, "\\'");
                    
                    let tokensHTML = "";
                    if (sentence.layer6_relationships && sentence.layer6_relationships.word_tokens && sentence.layer6_relationships.word_tokens.length > 0) {
                        sentence.layer6_relationships.word_tokens.forEach(tok => {
                            const lemmaRefEscaped = (tok.lemma_ref || "").replace(/'/g, "\\'");
                            tokensHTML += `<span class="word-token" onclick="openWordCard('${tok.transliteration}', '${sentenceGlyphEscaped}', this, '${lemmaRefEscaped}')">${tok.transliteration}</span>`;
                        });
                    } else if (sentence.layer1_core.transliteration) {
                        const words = sentence.layer1_core.transliteration.split(/\s+/);
                        words.forEach(word => {
                            const cleanWord = word.trim().replace(/[.,\/#!$%\^&\*;:{}=\-_`~()]/g,"");
                            if (cleanWord) {
                                tokensHTML += `<span class="word-token" onclick="openWordCard('${cleanWord}', '${sentenceGlyphEscaped}', this, '')">${cleanWord}</span>`;
                            }
                        });
                    }

                    // رصد وتوليد حقل الملاحظات والتعليقات واللغة الفرنسية إن وجدت في الملف الأصلي
                    const frenchText = sentence.layer2_languages.french || 'unknown';
                    const sentenceNotes = (sentence.layer7_research && sentence.layer7_research.notes) ? sentence.layer7_research.notes : 'unknown';

                    let frenchHTML = "";
                    if (frenchText !== 'unknown' && frenchText !== '') {
                        frenchHTML = `<div class="detail-row french-row"><strong>الفرنسية:</strong> <span>${frenchText}</span></div>`;
                    }

                    let notesHTML = "";
                    if (sentenceNotes !== 'unknown' && sentenceNotes !== '') {
                        notesHTML = `<div class="detail-row notes-row" style="color:var(--accent-color); font-style:italic;"><strong>الملاحظة الأثرية:</strong> <span>${sentenceNotes}</span></div>`;
                    }

                    card.innerHTML = `
                        <button class="suggest-btn" onclick="openSuggestionModal('${sentence.metadata.id}', 'sentence', this)">📝 اقترح تعديلاً</button>
                        <div class="glyphs-display" style="font-size: ${currentFontSize}px; margin-top:20px;">${sentence.layer1_core.hieroglyph}</div>
                        <div class="arabic-display" style="font-size: ${currentFontSize - 6}px">${sentence.layer2_languages.arabic}</div>
                        
                        <div class="details-section">
                            <div class="detail-row metadata-row">
                                <strong>المعرّف:</strong> <span>${sentence.metadata.id}</span>
                            </div>
                            <div class="detail-row translit-row">
                                <strong>النقل الصوتي:</strong> <span>${tokensHTML || 'لا يوجد'}</span>
                            </div>
                            <div class="detail-row english-row">
                                <strong>الإنجليزية:</strong> <span>${sentence.layer2_languages.english || 'N/A'}</span>
                            </div>
                            <div class="detail-row german-row">
                                <strong>الألمانية:</strong> <span>${sentence.layer2_languages.german || 'N/A'}</span>
                            </div>
                            <!-- عرض الترجمة الفرنسية ديناميكياً إن كانت متوفرة بالملف -->
                            ${frenchHTML}
                            <!-- عرض الملاحظات والتعليقات الأثرية للسطر ديناميكياً -->
                            ${notesHTML}
                        </div>
                    `;
                    container.appendChild(card);
                });

                updateVisibility();

            } catch (err) {
                container.innerHTML = `<p style="color:red">فشل تحميل القصة: {${err.message}}</p>`;
            }
        }

        window.onload = () => {
            fetchStoriesList();
        };
    </script>
</body>
</html>
