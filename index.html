<!DOCTYPE html>
<html lang="ar" data-theme="papyrus">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>منصة هيباتيا الرقمية للأدب المصري القديم</title>
    <!-- جلب مكتبة سوبابيز الرسمية للاتصال المباشر بقاعدة البيانات سحابياً -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        /* تعريف متغيرات الألوان للثيمات الثلاثة */
        :root[data-theme="papyrus"] {
            --bg-color: #f6ecd0;
            --text-color: #2c2512;
            --accent-color: #8c6239;
            --card-bg: #eddcb9;
            --border-color: #dac7a3;
            --muted-text: #6d5b3d;
            --success-color: #2f855a;
        }
        :root[data-theme="light"] {
            --bg-color: #fdfdfd;
            --text-color: #1a1a1a;
            --accent-color: #3182ce;
            --card-bg: #f7fafc;
            --border-color: #e2e8f0;
            --muted-text: #718096;
        }
        :root[data-theme="dark"] {
            --bg-color: #121212;
            --text-color: #e2e8f0;
            --accent-color: #63b3ed;
            --card-bg: #1d1d1d;
            --border-color: #2d3748;
            --muted-text: #a0aec0;
        }

        * {
            box-sizing: border-box;
            transition: background-color 0.2s, color 0.2s;
        }

        body {
            margin: 0;
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            display: flex;
            flex-direction: column;
            height: 100vh;
            overflow: hidden;
            direction: rtl;
            text-align: right;
        }

        /* تصغير حجوم خطوط وعناصر الواجهة لتتناسب مع شاشات الهواتف المعيارية */
        html {
            font-size: 11px;
        }

        /* ------------------------------------------------------------------------
           1. بوابة الدخول الكبرى والترحيب (Portal View)
           ------------------------------------------------------------------------ */
        .portal-view {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 30px 15px;
            overflow-y: auto;
        }

        .portal-card {
            background-color: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            padding: 30px 20px;
            max-width: 550px;
            width: 100%;
            text-align: center;
            box-shadow: 0 4px 15px rgba(0,0,0,0.03);
        }

        .portal-card h1 {
            font-family: 'Amiri', serif;
            font-size: 1.8rem;
            color: var(--accent-color);
            margin: 0 0 15px 0;
            line-height: 1.4;
        }

        .portal-card p {
            font-size: 1rem;
            line-height: 1.5;
            color: var(--muted-text);
            margin: 0 0 25px 0;
        }

        .portal-btn {
            background-color: var(--accent-color);
            border: 1px solid var(--accent-color);
            color: #fff;
            padding: 10px 25px;
            border-radius: 4px;
            cursor: pointer;
            font-family: 'Amiri', serif;
            font-size: 1.1rem;
            font-weight: bold;
            transition: opacity 0.2s;
            width: 100%;
            max-width: 300px;
        }

        .portal-btn:hover {
            opacity: 0.9;
        }

        /* ------------------------------------------------------------------------
           2. شريط تطبيق الهاتف العلوي والثابت (App Header)
           ------------------------------------------------------------------------ */
        .app-header {
            background-color: var(--card-bg);
            border-bottom: 2.5px solid var(--border-color);
            height: 50px;
            padding: 0 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 4px 6px -1px rgba(0,0,0,0.05);
            z-index: 100;
        }

        .app-header h2 {
            margin: 0;
            font-family: 'Amiri', serif;
            font-size: 1.15rem;
            color: var(--text-color);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            max-width: 55%;
        }

        .nav-btn {
            background-color: var(--border-color);
            border: 1px solid var(--border-color);
            color: var(--text-color);
            padding: 4px 10px;
            border-radius: 4px;
            cursor: pointer;
            font-family: 'Amiri', serif;
            font-size: 0.85rem;
            font-weight: bold;
            display: inline-flex;
            align-items: center;
            gap: 4px;
        }

        /* ------------------------------------------------------------------------
           3. واجهة تصفح وقراءة البرديات المتجاوبة (Reader View)
           ------------------------------------------------------------------------ */
        .reader-view {
            display: none; /* تفتح فقط بنقرة الباحث */
            flex: 1;
            flex-direction: column;
            overflow: hidden;
            position: relative;
        }

        .reader-workspace {
            flex: 1;
            display: flex;
            overflow: hidden;
            position: relative;
        }

        /* درج قائمة البرديات المنزلق المتجاوب مع شاشات الهواتف والتابلت */
        .sidebar-drawer {
            position: fixed;
            top: 50px;
            right: -285px; /* مخفي خارج الشاشة يميناً على الهاتف */
            width: 280px;
            height: calc(100vh - 50px);
            background-color: var(--card-bg);
            border-left: 1px solid var(--border-color);
            display: flex;
            flex-direction: column;
            padding: 15px;
            overflow-y: auto;
            z-index: 1000;
            transition: right 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .sidebar-drawer.open {
            right: 0 !important; /* انزلاق ودخول ناعم لليمين */
        }

        /* درج الخيارات والسمات المنزلق من اليسار (Hamburger Menu Drawer) */
        .settings-drawer {
            position: fixed;
            top: 50px;
            left: -285px; /* مخفي خارج الشاشة يساراً على الهاتف */
            width: 280px;
            height: calc(100vh - 50px);
            background-color: var(--card-bg);
            border-right: 1px solid var(--border-color);
            display: flex;
            flex-direction: column;
            padding: 15px;
            overflow-y: auto;
            z-index: 1000;
            transition: left 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            gap: 15px;
        }

        .settings-drawer.open {
            left: 0 !important; /* انزلاق ودخول ناعم لليصار */
        }

        .drawer-header {
            font-family: 'Amiri', serif;
            font-size: 1.25rem;
            font-weight: bold;
            border-bottom: 2.5px solid var(--accent-color);
            padding-bottom: 8px;
            margin-bottom: 12px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        /* لوحة القراءة وسرد أسطر البردية المتجاوبة تماماً */
        .reader-pane {
            flex: 1;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .scrollable-content {
            flex: 1;
            overflow-y: auto;
            padding: 15px;
        }

        .font-sizer {
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 0.85rem;
        }

        /* كارت الجملة وقراءة السطور - متجاوب تماماً مع الشاشات الصغيرة */
        .sentence-card {
            background-color: var(--card-bg);
            border-radius: 8px;
            padding: 15px;
            margin-bottom: 20px;
            border: 1px solid var(--border-color);
            display: flex;
            flex-direction: column;
        }

        .glyphs-display {
            font-size: 2rem;
            margin-bottom: 10px;
            line-height: 1.4;
            letter-spacing: 1px;
            color: var(--text-color);
            word-wrap: break-word;
        }

        /* حاوية الترجمة الرئيسية العريضة والمكبرة للسطر النشط (تتغير لغتها ديناميكياً) */
        .primary-translation-display {
            font-size: 1.65rem;
            font-weight: bold;
            line-height: 1.4;
            color: var(--text-color);
            margin-bottom: 10px;
            word-wrap: break-word;
        }

        .details-section {
            border-top: 1px dashed var(--border-color);
            padding-top: 10px;
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        .detail-row {
            display: flex;
            align-items: flex-start;
            gap: 8px;
            font-size: 0.85rem;
            line-height: 1.3;
        }

        .detail-row strong {
            min-width: 75px;
            color: var(--text-color);
            display: inline-block;
        }

        .detail-row span {
            color: var(--muted-text);
            flex: 1;
        }

        .theme-btn {
            background-color: var(--border-color);
            border: 1px solid var(--border-color);
            color: var(--text-color);
            padding: 4px 10px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 0.85rem;
            font-family: 'Amiri', serif;
            font-weight: bold;
        }

        .theme-btn:hover {
            background-color: var(--accent-color);
            color: #fff;
        }

        /* شاشات الإظهار لـ التاب والديسك توب (العرض الجانبي القياسي للـ Sidebar) */
        @media (min-width: 769px) {
            html {
                font-size: 12px;
            }
            .app-header h2 {
                max-width: 70%;
            }
            .sidebar-drawer {
                position: static;
                width: 280px;
                height: 100%;
                border-left: 1px solid var(--border-color);
            }
            .resize-splitter {
                display: block; /* يظهر فاصل السحب على شاشات الديسك توب فقط */
            }
            /* إخفاء الأزرار المخصصة للموبايل على الشاشات الكبيرة */
            #storiesDrawerBtn {
                display: none !important;
            }
        }

        @media (max-width: 768px) {
            .resize-splitter {
                display: none !important; /* إلغاء فواصل السحب على شاشات الموبايل لمنع التداخل البصري */
            }
        }
    </style>
</head>
<body>

    <!-- ========================================================================
       البوابة الأولى والواجهة الرئيسية للترحيب (Portal View)
       ======================================================================== -->
    <div class="portal-view" id="portalView">
        <div class="control-row" style="width: 100%; max-width: 550px; justify-content: flex-end; margin-bottom: 20px;">
            <div>
                <button class="theme-btn" onclick="setTheme('papyrus')">ورق بردي 📜</button>
                <button class="theme-btn" onclick="setTheme('light')">نهاري ☀️</button>
                <button class="theme-btn" onclick="setTheme('dark')">ليلي 🌙</button>
            </div>
        </div>

        <div class="portal-card">
            <h1>بوابة هيباتيا للأدب والعلوم المصرية القديمة ✒️</h1>
            <p>
                مستودع معرفي مخصص لعرض وقراءة المخطوطات والبرديات الفرعونية الكلاسيكية، 
                المتصلة مباشرة .
            </p>
            <button class="portal-btn" onclick="switchToReaderMode()">📖 مستودع القراءة (تصفح المخطوطات)</button>
        </div>
    </div>

    <!-- ========================================================================
       البوابة الثانية وواجهة القراءة المتجاوبة كبرنامج متكامل (Reader View)
       ======================================================================== -->
    <div class="reader-view" id="readerView">
        
        <!-- شريط التطبيق العلوي والثابت (App Bar) -->
        <header class="app-header">
            <button class="nav-btn" onclick="goBackToPortal()">🏠 البوابة</button>
            <h2 id="activeStoryLabel">📖 اختر مخطوطاً للبدء</h2>
            
            <div style="display: flex; gap: 5px;">
                <!-- أزرار تفاعلية تظهر فقط على شاشات الموبايل والتابلت لفتح الأدراج المنسدلة -->
                <button class="nav-btn" id="storiesDrawerBtn" onclick="toggleStoriesDrawer()">📜 القائمة</button>
                <button class="nav-btn" onclick="toggleSettingsDrawer()">☰ خيارات</button>
            </div>
        </header>

        <div class="reader-workspace">
            
            <!-- 1. درج قائمة البرديات والمخطوطات السحابية (RTL Sidebar) -->
            <div class="sidebar-drawer" id="sidebar">
                <div class="drawer-header" style="margin-top: 20px;">
                    <span>📜 البرديات المتاحة</span>
                    <button class="modal-close" id="sidebarCloseBtn" onclick="toggleStoriesDrawer()" style="display: none;">✕</button>
                </div>
                <div id="storiesList">
                    <p style="font-size: 0.85rem; color: var(--muted-text);">جاري فحص قاعدة البيانات السحابية...</p>
                </div>
            </div>

            <!-- فاصل السحب والتحجيم الرأسي (يظهر فقط على الديسكتوب) -->
            <div class="resize-splitter" id="splitter1"></div>

            <!-- 2. لوحة القراءة وسرد أسطر البردية المتجاوبة تماماً -->
            <div class="reader-pane">
                <div class="scrollable-content" id="storyContainer">
                    <p>يرجى اختيار قصة من القائمة الجانبية للبدء بالقراءة.</p>
                </div>
            </div>

            <!-- 3. درج الخيارات والسمات والطبقات المنزلق من اليسار (LTL Settings Drawer) -->
            <div class="settings-drawer" id="settingsDrawer">
                <div class="drawer-header">
                    <span>⚙️ خيارات العرض والسمات</span>
                    <button class="modal-close" onclick="toggleSettingsDrawer()">✕</button>
                </div>
                
                <div class="form-group">
                    <label>السمة البصرية:</label>
                    <div style="display: flex; gap: 4px; margin-top: 5px;">
                        <button class="theme-btn" onclick="setTheme('papyrus')">بردي 📜</button>
                        <button class="theme-btn" onclick="setTheme('light')">نهاري ☀️</button>
                        <button class="theme-btn" onclick="setTheme('dark')">ليلي 🌙</button>
                    </div>
                </div>

                <!-- زر تفاعلي جديد ومبتكر لاختيار وتخصيص لغة القراءة الكبرى والأساسية تحت الهيروغليفية -->
                <div class="form-group" style="margin-top: 10px;">
                    <label for="primaryLangSelect">لغة القراءة الرئيسية (تحت الهيروغليفية):</label>
                    <select id="primaryLangSelect" onchange="applyPrimaryLanguage(this.value)" style="margin-top: 5px;">
                        <option value="arabic">العربية 🇪🇬</option>
                        <option value="english">الإنجليزية 🇬🇧</option>
                        <option value="german">الألمانية 🇩🇪</option>
                        <option value="french">الفرنسية 🇫🇷</option>
                    </select>
                </div>

                <div class="form-group" style="margin-top: 10px;">
                    <label>حجم الخط للسطور:</label>
                    <input type="range" min="14" max="36" value="26" oninput="changeFontSize(this.value)" style="margin-top: 5px;">
                </div>

                <div class="form-group" style="margin-top: 10px; border-top: 1px dashed var(--border-color); padding-top: 10px;">
                    <label style="margin-bottom: 8px; display: block;">حدد طبقات العرض النشطة في التفاصيل:</label>
                    <div class="checkbox-group" style="grid-template-columns: 1fr;">
                        <label class="checkbox-item"><input type="checkbox" id="showGlyphs" checked onchange="updateVisibility()"> الرسم الفرعوني</label>
                        <label class="checkbox-item"><input type="checkbox" id="showArabic" checked onchange="updateVisibility()"> الترجمة العربية</label>
                        <label class="checkbox-item"><input type="checkbox" id="showId" checked onchange="updateVisibility()"> معرّف السطر</label>
                        <label class="checkbox-item"><input type="checkbox" id="showTranslit" checked onchange="updateVisibility()"> النقل الصوتي</label>
                        <label class="checkbox-item"><input type="checkbox" id="showEnglish" checked onchange="updateVisibility()"> الإنجليزية</label>
                        <label class="checkbox-item"><input type="checkbox" id="showGerman" checked onchange="updateVisibility()"> الألمانية</label>
                        <label class="filter-item"><input type="checkbox" id="showFrench" checked onchange="updateVisibility()"> الفرنسية</label>
                        <label class="filter-item"><input type="checkbox" id="showNotes" checked onchange="updateVisibility()"> الملاحظات الأثرية</label>
                    </div>
                </div>
            </div>

        </div>
    </div>

    <script>
        const SUPABASE_URL = "https://nhkwdbhbmgnnzilrxulx.supabase.co";
        const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im5oa3dkYmhibWdubnppbHJ4dWx4Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODQ3NTc4NjksImV4cCI6MjEwMDMzMzg2OX0.d73X1zt-l48N5RCCJwxubFe_EZloUCs9_M3Pu2sIpTQ";

        let _supabase = null;
        let currentFontSize = 26;
        let activeLang = "arabic"; // القيمة الافتراضية للغة القراءة الكبرى

        function setTheme(themeName) {
            document.documentElement.setAttribute('data-theme', themeName);
            localStorage.setItem('hypatia_theme_v2', themeName);
        }

        function initTheme() {
            const savedTheme = localStorage.getItem('hypatia_theme_v2') || 'papyrus';
            setTheme(savedTheme);
        }

        // دالة التحكم بـ حجم الخطوط مع مواءمتها للغة الترجيب الكبرى الديناميكية
        function changeFontSize(size) {
            currentFontSize = parseInt(size);
            const glyphs = document.querySelectorAll('.glyphs-display');
            const primaryDisplays = document.querySelectorAll('.primary-translation-display');
            glyphs.forEach(el => el.style.fontSize = size + 'px');
            primaryDisplays.forEach(el => el.style.fontSize = (size - 6) + 'px');
        }

        function toggleHeaderSettings(btn) {
            const settings = document.getElementById('headerSettings');
            if (settings.style.display === 'none') {
                settings.style.display = 'flex';
                btn.innerText = "خيارات العرض ▲";
            } else {
                settings.style.display = 'none';
                btn.innerText = "خيارات العرض ▼";
            }
        }

        // دالة التبديل المعماري أحادي الصفحة لفتح واجهة القراءة
        function switchToReaderMode() {
            document.getElementById('portalView').style.display = 'none';
            document.getElementById('readerView').style.display = 'flex';
            fetchStoriesList();
        }

        // دالة العودة للبوابة الرئيسية الموحدة
        function goBackToPortal() {
            document.getElementById('sidebar').classList.remove('open');
            document.getElementById('settingsDrawer').classList.remove('open');
            
            document.getElementById('readerView').style.display = 'none';
            document.getElementById('portalView').style.display = 'flex';
        }

        // دالة فتح/إغلاق درج قائمة البرديات الجانبي للموبايل
        function toggleStoriesDrawer() {
            const sidebar = document.getElementById('sidebar');
            sidebar.classList.toggle('open');
            document.getElementById('settingsDrawer').classList.remove('open');
        }

        // دالة فتح/إغلاق درج الخيارات والسمات والطبقات للموبايل
        function toggleSettingsDrawer() {
            const drawer = document.getElementById('settingsDrawer');
            drawer.classList.toggle('open');
            document.getElementById('sidebar').classList.remove('open');
        }

        // دالة تبديل لغة القراءة الكبرى والأساسية تحت السطور الهيروغليفية ديناميكياً وبصرياً
        function applyPrimaryLanguage(langCode) {
            activeLang = langCode;
            const displays = document.querySelectorAll('.primary-translation-display');
            
            displays.forEach(el => {
                const ar = el.getAttribute('data-ar') || '';
                const en = el.getAttribute('data-en') || '';
                const de = el.getAttribute('data-de') || '';
                const fr = el.getAttribute('data-fr') || '';
                
                if (langCode === 'arabic') {
                    el.innerText = ar;
                    el.style.fontFamily = "'Amiri', serif";
                    el.style.direction = "rtl";
                } else if (langCode === 'english') {
                    el.innerText = en;
                    el.style.fontFamily = "'Inter', sans-serif";
                    el.style.direction = "ltr";
                } else if (langCode === 'german') {
                    el.innerText = de;
                    el.style.fontFamily = "'Inter', sans-serif";
                    el.style.direction = "ltr";
                } else if (langCode === 'french') {
                    el.innerText = fr;
                    el.style.fontFamily = "'Inter', sans-serif";
                    el.style.direction = "ltr";
                }
            });
            changeFontSize(currentFontSize); // إعادة المواءمة للحجم بعد التبديل لعدم حدوث خلل
        }

        // برمجة فواصل السحب وتوسيع الألواح بالماوس (تتفعل فقط على الشاشات الكبيرة)
        function initResize(splitterId, targetId, isRightToLeft) {
            const splitter = document.getElementById(splitterId);
            const target = document.getElementById(targetId);
            
            splitter.onmousedown = function(e) {
                if (window.innerWidth <= 768) return; 
                e.preventDefault();
                document.onmousemove = function(moveEvent) {
                    let newWidth;
                    if (isRightToLeft) {
                        newWidth = window.innerWidth - moveEvent.clientX;
                    } else {
                        newWidth = moveEvent.clientX;
                    }
                    if (newWidth > 150 && newWidth < 450) {
                        target.style.width = newWidth + 'px';
                        target.style.minWidth = newWidth + 'px';
                        target.style.maxWidth = newWidth + 'px';
                        target.style.flex = 'none';
                    }
                };
                document.onmouseup = function() {
                    document.onmousemove = null;
                    document.onmouseup = null;
                };
            };
        }
        initResize('splitter1', 'sidebar', false);

        function updateVisibility() {
            const configs = [
                { id: 'showGlyphs', selector: '.glyphs-display' },
                { id: 'showArabic', selector: '.primary-translation-display' }, // ربط التحكم بالإظهار للحاوية الأساسية الكبرى أيضاً
                { id: 'showId', selector: '.metadata-row' },
                { id: 'showTranslit', selector: '.translit-row' },
                { id: 'showEnglish', selector: '.english-row' },
                { id: 'showGerman', selector: '.german-row' },
                { id: 'showFrench', selector: '.french-row' },
                { id: 'showNotes', selector: '.notes-row' }
            ];

            configs.forEach(cfg => {
                const isChecked = document.getElementById(cfg.id).checked;
                const elements = document.querySelectorAll(cfg.selector);
                elements.forEach(el => {
                    el.style.display = isChecked ? '' : 'none';
                });
            });
        }

        function initSupabase() {
            if (!_supabase && typeof supabase !== 'undefined') {
                const { createClient } = supabase;
                _supabase = createClient(SUPABASE_URL, SUPABASE_KEY);
            }
        }

        // دالة جلب وعرض القصص حياً من جدول stories السحابي
        async function fetchStoriesList() {
            const listContainer = document.getElementById('storiesList');
            try {
                initSupabase();
                if (!_supabase) throw new Error("مكتبة سوبابيز غير مهيأة.");

                const { data: stories, error } = await _supabase
                    .from('stories')
                    .select('id, title_ar')
                    .order('id', { ascending: true });

                if (error) throw error;

                if (stories.length === 0) {
                    listContainer.innerHTML = `<p style="font-size: 0.9rem; color: red;">لم يتم العثور على برديات مؤرشفة.</p>`;
                    return;
                }

                listContainer.innerHTML = ""; 
                
                stories.forEach((story, index) => {
                    const link = document.createElement('div');
                    link.className = `story-link ${index === 0 ? 'active' : ''}`;
                    link.id = `link-${story.id}`;
                    link.innerText = `${story.id}: ${story.title_ar}`;
                    link.onclick = () => {
                        document.querySelectorAll('.story-link').forEach(el => el.classList.remove('active'));
                        link.classList.add('active');
                        
                        if (window.innerWidth <= 768) {
                            document.getElementById('sidebar').classList.remove('open');
                        }
                        
                        loadStory(story.id);
                    };
                    listContainer.appendChild(link);
                });

                loadStory(stories[0].id);

            } catch (err) {
                listContainer.innerHTML = `<p style="color:red; font-size:0.85rem;">فشل الاتصال بـ Supabase: ${err.message}</p>`;
            }
        }

        // دالة جلب البردية وسطورها من جدول sentences السحابي بطلب مباشر وسريع
        async function loadStory(storyId) {
            const container = document.getElementById('storyContainer');
            container.innerHTML = "<p>جاري تحميل المخطوط حياً من سحابة سوبابيز...</p>";
            
            try {
                initSupabase();

                const { data: story, error: err1 } = await _supabase
                    .from('stories')
                    .select('title_ar')
                    .eq('id', storyId)
                    .single();

                if (err1) throw err1;

                const { data: sentences, error: err2 } = await _supabase
                    .from('sentences')
                    .select('*')
                    .eq('story_id', storyId)
                    .order('sequence_no', { ascending: true });

                if (err2) throw err2;

                container.innerHTML = ""; 
                document.getElementById('activeStoryLabel').innerText = `📖 ${story.title_ar || storyId}`;

                sentences.forEach(s => {
                    const card = document.createElement('div');
                    card.className = 'sentence-card';
                    
                    const frenchText = s.translation_fr || 'unknown';
                    const sentenceNotes = s.notes || 'unknown';

                    let frenchHTML = "";
                    if (frenchText !== 'unknown' && frenchText !== '') {
                        frenchHTML = `<div class="detail-row french-row"><strong>الفرنسية:</strong> <span>${frenchText}</span></div>`;
                    }

                    let notesHTML = "";
                    if (sentenceNotes !== 'unknown' && sentenceNotes !== '') {
                        notesHTML = `<div class="detail-row notes-row" style="color:var(--accent-color); font-style:italic;"><strong>الملاحظة الأثرية:</strong> <span>${sentenceNotes}</span></div>`;
                    }

                    // تجهيز وعرض الترجمة الكبرى والأساسية بناءً على خيار لغة القراءة المختارة للباحث
                    let initialPrimaryText = s.translation_ar;
                    let initialDirection = "rtl";
                    let initialFont = "'Amiri', serif";
                    
                    if (activeLang === 'english') {
                        initialPrimaryText = s.translation_en;
                        initialDirection = "ltr";
                        initialFont = "'Inter', sans-serif";
                    } else if (activeLang === 'german') {
                        initialPrimaryText = s.translation_de;
                        initialDirection = "ltr";
                        initialFont = "'Inter', sans-serif";
                    } else if (activeLang === 'french') {
                        initialPrimaryText = s.translation_fr;
                        initialDirection = "ltr";
                        initialFont = "'Inter', sans-serif";
                    }

                    card.innerHTML = `
                        <div class="glyphs-display" style="font-size: ${currentFontSize}px;">${s.hieroglyph}</div>
                        
                        <!-- الحاوية الأساسية الكبرى للترجمة المحددة لغوياً -->
                        <div class="primary-translation-display" 
                             data-ar="${s.translation_ar || ''}" 
                             data-en="${s.translation_en || 'N/A'}" 
                             data-de="${s.translation_de || 'N/A'}" 
                             data-fr="${s.translation_fr || 'N/A'}"
                             style="font-size: ${currentFontSize - 6}px; font-family: ${initialFont}; direction: ${initialDirection};">
                             ${initialPrimaryText}
                        </div>
                        
                        <div class="details-section">
                            <div class="detail-row metadata-row">
                                <strong>المعرّف:</strong> <span>${s.id}</span>
                            </div>
                            <div class="detail-row translit-row">
                                <strong>النقل الصوتي:</strong> <span>${s.transliteration}</span>
                            </div>
                            <div class="detail-row english-row">
                                <strong>الإنجليزية:</strong> <span>${s.translation_en || 'N/A'}</span>
                            </div>
                            <div class="detail-row german-row">
                                <strong>الألمانية:</strong> <span>${s.translation_de || 'N/A'}</span>
                            </div>
                            ${frenchHTML}
                            ${notesHTML}
                        </div>
                    `;
                    container.appendChild(card);
                });

                updateVisibility();

            } catch (err) {
                container.innerHTML = `<p style="color:red">فشل جلب المخطوط من السحابة: {${err.message}}</p>`;
            }
        }

        // آلية التكيف والمواءمة البصرية لأزرار الأدراج بناءً على حجم شاشة العرض (Responsive Initializer)
        function handleResize() {
            const sidebar = document.getElementById('sidebar');
            const storiesBtn = document.getElementById('storiesDrawerBtn');
            const sidebarClose = document.getElementById('sidebarCloseBtn');

            if (window.innerWidth <= 768) {
                storiesBtn.style.display = 'inline-flex';
                sidebarClose.style.display = 'block';
                sidebar.classList.remove('open');
                sidebar.style.width = '280px';
                sidebar.style.minWidth = '0';
                sidebar.style.maxWidth = 'none';
            } else {
                storiesBtn.style.display = 'none';
                sidebarClose.style.display = 'none';
                sidebar.classList.remove('open');
                sidebar.style.width = '280px';
                sidebar.style.minWidth = '150px';
                sidebar.style.maxWidth = '450px';
                sidebar.style.flex = 'none';
            }
        }

        window.addEventListener('resize', handleResize);

        window.onload = () => {
            initTheme();
            handleResize();
        };
    </script>
</body>
</html>
